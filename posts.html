  <link rel="stylesheet" href="css/style.css">

<body>
  <header class="header" id="header">
    <div class="container">
      <div class="header-inner">
        <a href="index.html" class="logo">
          <div class="logo-icon">QA</div>
          <div class="logo-text">
            Tech Knowledge
            <span>Quality Assurance</span>
          </div>
        </a>
        <nav class="nav">
          <a href="index.html" class="nav-link">首页</a>
          <a href="posts.html" class="nav-link active">文章</a>
          <a href="tools.html" class="nav-link">工具</a>
          <a href="knowledge.html" class="nav-link">知识库</a>
          <a href="about.html" class="nav-link">关于</a>
        </nav>
        <button class="search-btn" onclick="location.href='posts.html'" aria-label="搜索">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
        <button class="mobile-menu-btn" aria-label="菜单">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </header>

  <div class="page-header">
    <div class="container">
      <h1 class="page-title">所有文章</h1>
      <p class="page-subtitle">测试技术，持续更新中...</p>
    </div>
  </div>

  <div class="filters">
    <div class="container">
      <div class="filter-scroll">
        <button class="filter-btn active" data-tag="all">全部</button>
        <button class="filter-btn" data-tag="Agent">Agent</button>
        <button class="filter-btn" data-tag="Prompts">Prompts</button>
        <button class="filter-btn" data-tag="MCP">MCP</button>
        <button class="filter-btn" data-tag="Skills">Skills</button>
        <button class="filter-btn" data-tag="LLM">LLM</button>
        <button class="filter-btn" data-tag="AI工具">AI工具</button>
        <button class="filter-btn" data-tag="智能体平台">智能体平台</button>
        <button class="filter-btn" data-tag="性能测试">性能测试</button>
        <button class="filter-btn" data-tag="自动化测试">自动化测试</button>
        <button class="filter-btn" data-tag="面试题库">面试题库</button>
      </div>
    </div>
  </div>

  <section class="post-list">
    <div class="container">
      <div id="posts-container">
        <div style="text-align: center; padding: 60px;">
          <p style="color: var(--color-text-secondary);">正在加载文章...</p>
        </div>
      </div>
      <div id="pagination" class="pagination"></div>
    </div>
  </section>

  <footer class="footer" id="footer">
    <div class="container">
      <div class="footer-content">

            GitHub

          <span class="footer-divider">|</span>
          <span>© 2025 Tech Knowledge - 质量源于专注</span>

      </div>
    </div>
  </footer>

  <script src="js/posts.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => Posts.init());
  </script>

  <div class="wechat-float-btn" onclick="showWechatModal()">

    </svg>
  </div>

  <div class="wechat-modal-overlay" id="wechatModal" onclick="hideWechatModal()">
    <div class="wechat-modal" onclick="event.stopPropagation()">
      <div class="wechat-modal-title">微信公众号</div>
      <div class="wechat-modal-qrcode">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=TechKnowledge" alt="微信公众号二维码" style="width: 180px; height: 180px;"/>
      </div>
      <div class="wechat-modal-desc">扫码关注公众号<br/>获取更多测试技术干货</div>
    </div>
  </div>

  <script>
    function showWechatModal() {
      document.getElementById('wechatModal').classList.add('active');
    }
    function hideWechatModal() {
      document.getElementById('wechatModal').classList.remove('active');
    }
  </script>
</body>
</html>
